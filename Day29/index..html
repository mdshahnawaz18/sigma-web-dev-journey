<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .box1 {
            background-color: rgb(246, 230, 202);
            border-radius: 5%;
            width: 30vw;
            border: 1px solid black;
            margin: 50px;

        }

        .box1 img {
            height: 420px;
            width: 420px;
            border: 1px solid black;
            margin-left: 20px;

            margin-top: 15px;
            margin-bottom: 10px;
        }

        .btn {
            margin-left: 20px;
        }

        .btn button {
            background-color: aqua;
            padding: 5px 9px;
            margin: 10px;
            border-radius: 200px;
            cursor: pointer;
            border: 0.5px solid rgb(42, 6, 184);
        }

        .main {
            margin-left: 18px;
        }

        .main p {
            color: rgb(132, 78, 6);
        }
    </style>
</head>

<body>
    <div class="box1">
        <div class="image">
            <img src="https://thumbs.dreamstime.com/z/handsome-man-rowing-boat-young-casual-man-sitting-boat-rowing-looking-away-background-lake-mountains-103159867.jpg"
                alt="Boat Image">
            <div class="btn">
                <button>Lake</button>
                <button>Water</button>
            </div>
            <div class="main">
                <h2>BOAT IMAGE</h2>

                    itaque rem quas, placeat ipsam necessitatibus, velit modi?
                </p>

            </div>
        </div>
    </div>
</body>

</html>
